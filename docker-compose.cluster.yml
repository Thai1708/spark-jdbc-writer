# Spark Cluster Mode - Simulating AWS Glue G.1X (2 workers)
# G.1X: 4 vCPU, 16 GB RAM per worker (using 4GB for local testing)
#
# Usage:
#   docker-compose -f docker-compose.cluster.yml up -d
#   Open Spark Master UI: http://localhost:8080
#   Open Spark App UI:    http://localhost:4040
#   History Server:       http://localhost:18080

x-spark-common: &spark-common
  SPARK_NO_DAEMONIZE: "true"
  SPARK_CONF_DIR: /tmp/spark-conf

services:
  postgres:
    image: postgres:15-alpine
    container_name: cluster-postgres
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "5433:5432"
    volumes:
      - ./tests/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - spark-network

  spark-master:
    image: public.ecr.aws/glue/aws-glue-libs:5
    container_name: spark-master
    environment:
      <<: *spark-common
    ports:
      - "8080:8080"   # Master Web UI
      - "7077:7077"   # Master port
      - "4041:4040"   # Application UI (mapped to 4041 to avoid conflict)
      - "18080:18080" # History Server
    volumes:
      - ./python:/app/python
      - ./glue_artifact:/app/glue_artifact
      - ./tests:/app/tests
      - spark-events:/tmp/spark-events
    networks:
      - spark-network
    entrypoint: ["bash", "-c"]
    command:
      - |
        mkdir -p /tmp/spark-events /tmp/spark-conf /var/log/spark
        cat > /tmp/spark-conf/spark-defaults.conf << 'EOF'
        spark.authenticate=false
        spark.authenticate.enableSaslEncryption=false
        spark.network.crypto.enabled=false
        spark.eventLog.enabled=true
        spark.eventLog.dir=file:///tmp/spark-events
        spark.history.fs.logDirectory=file:///tmp/spark-events
        spark.master.rest.enabled=true
        EOF
        export SPARK_CONF_DIR=/tmp/spark-conf
        export SPARK_LOG_DIR=/var/log/spark
        export SPARK_MASTER_HOST=spark-master
        export SPARK_MASTER_PORT=7077
        export SPARK_MASTER_WEBUI_PORT=8080
        /usr/lib/spark/sbin/start-master.sh
        sleep 5
        /usr/lib/spark/sbin/start-history-server.sh
        tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  spark-worker-1:
    image: public.ecr.aws/glue/aws-glue-libs:5
    container_name: spark-worker-1
    hostname: spark-worker-1
    environment:
      <<: *spark-common
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "8081:8081"
    volumes:
      - ./python:/app/python
      - ./glue_artifact:/app/glue_artifact
      - ./tests:/app/tests
      - spark-events:/tmp/spark-events
    tmpfs:
      - /tmp/spark-work:size=2G,uid=10000,gid=10000
    depends_on:
      spark-master:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - spark-network
    entrypoint: ["bash", "-c"]
    command:
      - |
        mkdir -p /tmp/spark-conf /var/log/spark
        cat > /tmp/spark-conf/spark-defaults.conf << 'EOF'
        spark.authenticate=false
        spark.authenticate.enableSaslEncryption=false
        spark.network.crypto.enabled=false
        EOF
        export SPARK_CONF_DIR=/tmp/spark-conf
        export SPARK_LOG_DIR=/var/log/spark
        export SPARK_WORKER_CORES=4
        export SPARK_WORKER_MEMORY=4g
        export SPARK_WORKER_WEBUI_PORT=8081
        export SPARK_WORKER_DIR=/tmp/spark-work
        pip install /app/python/ -q
        /usr/lib/spark/sbin/start-worker.sh spark://spark-master:7077
        tail -f /dev/null

  spark-worker-2:
    image: public.ecr.aws/glue/aws-glue-libs:5
    container_name: spark-worker-2
    hostname: spark-worker-2
    environment:
      <<: *spark-common
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "8082:8082"
    volumes:
      - ./python:/app/python
      - ./glue_artifact:/app/glue_artifact
      - ./tests:/app/tests
      - spark-events:/tmp/spark-events
    tmpfs:
      - /tmp/spark-work:size=2G,uid=10000,gid=10000
    depends_on:
      spark-master:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - spark-network
    entrypoint: ["bash", "-c"]
    command:
      - |
        mkdir -p /tmp/spark-conf /var/log/spark
        cat > /tmp/spark-conf/spark-defaults.conf << 'EOF'
        spark.authenticate=false
        spark.authenticate.enableSaslEncryption=false
        spark.network.crypto.enabled=false
        EOF
        export SPARK_CONF_DIR=/tmp/spark-conf
        export SPARK_LOG_DIR=/var/log/spark
        export SPARK_WORKER_CORES=4
        export SPARK_WORKER_MEMORY=4g
        export SPARK_WORKER_WEBUI_PORT=8082
        export SPARK_WORKER_DIR=/tmp/spark-work
        pip install /app/python/ -q
        /usr/lib/spark/sbin/start-worker.sh spark://spark-master:7077
        tail -f /dev/null

  # Driver container for submitting jobs
  spark-driver:
    image: public.ecr.aws/glue/aws-glue-libs:5
    container_name: spark-driver
    environment:
      <<: *spark-common
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: ap-southeast-1
    volumes:
      - ./python:/app/python
      - ./glue_artifact:/app/glue_artifact
      - ./tests:/app/tests
      - spark-events:/tmp/spark-events
    working_dir: /app
    depends_on:
      spark-master:
        condition: service_healthy
      spark-worker-1:
        condition: service_started
      spark-worker-2:
        condition: service_started
    networks:
      - spark-network
    entrypoint: ["bash", "-c"]
    command:
      - |
        mkdir -p /tmp/spark-conf
        cat > /tmp/spark-conf/spark-defaults.conf << 'EOF'
        spark.authenticate=false
        spark.authenticate.enableSaslEncryption=false
        spark.network.crypto.enabled=false
        spark.master=spark://spark-master:7077
        spark.eventLog.enabled=true
        spark.eventLog.dir=file:///tmp/spark-events
        spark.driver.host=spark-driver
        spark.driver.bindAddress=0.0.0.0
        EOF
        export SPARK_CONF_DIR=/tmp/spark-conf
        pip install /app/python/ -q
        tail -f /dev/null

networks:
  spark-network:
    driver: bridge

volumes:
  spark-events:
